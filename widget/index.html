<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-family: "Space Grotesk", sans-serif; background-color: #000; overflow: hidden; user-select: none; -webkit-user-select: none; }
        .bg-photo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url("images/background.jpg") center center / cover no-repeat; z-index: 1; }
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .bg-video { position: absolute; top: 50%; left: 50%; width: 100.5%; height: 100.5%; object-fit: cover; transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.8s ease; }
        .bg-video.active { opacity: 1; }
        .widget { position: relative; z-index: 10; width: 400px; height: 420px; background: rgba(0, 0, 0, 0.4); -webkit-backdrop-filter: blur(5px); backdrop-filter: blur(5px); border-radius: 0; border: 1px solid rgba(255, 255, 255, 0.1); color: white; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); padding: 30px 30px 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .tabs { display: flex; justify-content: center; gap: 35px; margin-bottom: 10px; flex-shrink: 0; position: relative; z-index: 30; }
        .tab-icon { cursor: pointer; width: 22px; height: 22px; fill: white; opacity: 0.25; transition: all 0.3s; -webkit-tap-highlight-color: transparent; }
        .tab-icon.active { opacity: 1; filter: drop-shadow(0 0 8px white); }
        .view { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; width: 100%; overflow: hidden; }
        .view.active { display: flex; }
        .date-day { font-size: 22px; text-transform: uppercase; letter-spacing: 4px; font-weight: 500; margin-bottom: 6px; }
        .date-full { font-size: 16px; font-weight: 300; letter-spacing: 1px; margin-bottom: 25px; opacity: 0.9; }
        .time-text { font-size: 60px; font-weight: 700; letter-spacing: 2px; line-height: 1; margin-bottom: 10px; }
        .overlay { position: absolute; top: 65px; bottom: 110px; left: 20px; right: 20px; background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; z-index: 20; display: flex; flex-direction: column; overflow: hidden; opacity: 0; pointer-events: none; transform: scale(0.95); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .overlay.show { opacity: 1; pointer-events: auto; transform: scale(1); }
        .overlay-title { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.5; padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); flex-shrink: 0; }
        .overlay-content { overflow-y: auto; flex-grow: 1; padding: 5px; }
        .list-item { padding: 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.5); cursor: pointer; transition: all 0.2s; border-radius: 8px; margin-bottom: 2px; text-align: center; }
        .list-item:hover { color: rgba(255, 255, 255, 0.9); background: rgba(255, 255, 255, 0.05); }
        .list-item.selected { color: white; font-weight: bold; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 10px rgba(255, 255, 255, 0.05); }
        .overlay-content::-webkit-scrollbar { width: 4px; }
        .overlay-content::-webkit-scrollbar-track { background: transparent; }
        .overlay-content::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        .quote-container { position: relative; z-index: 30; font-size: 17px; font-style: italic; margin-top: 10px; line-height: 1.6; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.15); min-height: 45px; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 15px; border: none; }
    </style>
</head>
<body>
    <div class="bg-photo"></div>
    <div class="video-container">
        <video id="vid-cafe" class="bg-video" src="videos/cafe.mp4" loop muted playsinline preload="none"></video>
        <video id="vid-shop" class="bg-video" src="videos/shop.mp4" loop muted playsinline preload="none"></video>
        <video id="vid-yard" class="bg-video" src="videos/yard.mp4" loop muted playsinline preload="none"></video>
    </div>
    
    <audio id="aud-rain" src="audios/rain.m4a" loop preload="none"></audio>
    <audio id="aud-fire" src="audios/fire.m4a" loop preload="none"></audio>
    <audio id="aud-cave" src="audios/cave.m4a" loop preload="none"></audio>

    <div class="widget" id="mainWidget">
        <div class="tabs">
            <svg class="tab-icon active" id="tab-clock" onclick="switchView('clock')" viewBox="0 0 24 24"><path d="M12 2c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2zm0 2a8 8 0 1 0 0 16 8 8 0 0 0 0-16zm1 8h4v2h-6V7h2v5z"/></svg>
            <svg class="tab-icon" id="tab-video" onclick="toggleOverlay('video')" oncontextmenu="turnOffMedia(event, 'video')" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-10 12V8l6 4-6 4z"/></svg>
            <svg class="tab-icon" id="tab-audio" onclick="toggleOverlay('audio')" oncontextmenu="turnOffMedia(event, 'audio')" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>

        <div id="view-clock" class="view active">
            <div class="date-day" id="date-day">SUNDAY</div>
            <div class="date-full" id="date-full">February 22, 2026</div>
            <div class="time-text" id="time-text">00:00:00</div>
        </div>

        <div class="overlay" id="overlay-video">
            <div class="overlay-title">Visual Atmosphere</div>
            <div class="overlay-content">
                <div class="list-item" onclick="selectVideo('cafe', this)">Cafe</div>
                <div class="list-item" onclick="selectVideo('shop', this)">Shop</div>
                <div class="list-item" onclick="selectVideo('yard', this)">Yard</div>
            </div>
        </div>

        <div class="overlay" id="overlay-audio">
            <div class="overlay-title">Background Audio</div>
            <div class="overlay-content">
                <div class="list-item" onclick="selectAudio('rain', this)">Rain</div>
                <div class="list-item" onclick="selectAudio('fire', this)">Fire</div>
                <div class="list-item" onclick="selectAudio('cave', this)">Cave</div>
            </div>
        </div>

        <div class="quote-container" id="quote"></div>
    </div>

    <script>
        const quotes = ["The future belongs to those who believe in the beauty of their dreams.", "Strive not to be a success, but rather to be of value.", "Every moment is a fresh beginning.", "Believe you can and you're halfway there.", "The only way to do great work is to love what you do.", "The best way to predict the future is to create it.", "The best preparation for tomorrow is doing your best today.", "The only limit to our realization of tomorrow will be our doubts of today.", "Action is the foundational key to all success.", "Discipline is the bridge between goals and accomplishment."];
        const daysOfWeek = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        let activeView = 'clock';
        let overlayOpen = null;
        let activeVid = null;
        let activeAud = null;

        function updateTabStates() {
            document.getElementById('tab-clock').classList.toggle('active', activeView === 'clock');
            const isAudioActive = (activeAud !== null) || (overlayOpen === 'audio');
            const isVideoActive = (activeVid !== null) || (overlayOpen === 'video');
            document.getElementById('tab-audio').classList.toggle('active', isAudioActive);
            document.getElementById('tab-video').classList.toggle('active', isVideoActive);
        }

        function switchView(t) {
            activeView = t;
            overlayOpen = null;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            document.querySelectorAll('.overlay').forEach(o => o.classList.remove('show'));
            updateTabStates();
        }

        function toggleOverlay(type) {
            if (overlayOpen === type) {
                overlayOpen = null;
            } else {
                overlayOpen = type;
            }
            document.getElementById('overlay-audio').classList.toggle('show', overlayOpen === 'audio');
            document.getElementById('overlay-video').classList.toggle('show', overlayOpen === 'video');
            updateTabStates();
        }

        function selectVideo(k, element) {
            const isSame = (activeVid === k);
            if(activeVid) {
                const prev = document.getElementById('vid-'+activeVid);
                prev.pause();
                prev.classList.remove('active');
            }
            document.querySelectorAll('#overlay-video .list-item').forEach(el => el.classList.remove('selected'));
            if(k !== null && !isSame) {
                const v = document.getElementById('vid-'+k);
                v.play();
                v.classList.add('active');
                activeVid = k;
                if(element) element.classList.add('selected');
            } else {
                activeVid = null;
            }
            overlayOpen = null;
            document.getElementById('overlay-video').classList.remove('show');
            updateTabStates();
        }

        function selectAudio(k, element) {
            const isSame = (activeAud === k);
            if(activeAud) {
                document.getElementById('aud-'+activeAud).pause();
            }
            document.querySelectorAll('#overlay-audio .list-item').forEach(el => el.classList.remove('selected'));
            if(k !== null && !isSame) {
                document.getElementById('aud-'+k).play();
                activeAud = k;
                if(element) element.classList.add('selected');
            } else {
                activeAud = null;
            }
            overlayOpen = null;
            document.getElementById('overlay-audio').classList.remove('show');
            updateTabStates();
        }

        function turnOffMedia(e, type) {
            e.preventDefault();
            if (type === 'video') {
                selectVideo(null, null);
            } else if (type === 'audio') {
                selectAudio(null, null);
            }
        }

        function updateTime(){
            const n=new Date();
            document.getElementById('time-text').textContent=n.toLocaleTimeString('en-GB');
            document.getElementById('date-day').textContent = daysOfWeek[n.getDay()];
            document.getElementById('date-full').textContent = monthNames[n.getMonth()] + " " + n.getDate() + ", " + n.getFullYear();
        }
        setInterval(updateTime,1000); updateTime();
        
        function setRandomQuote(){document.getElementById("quote").textContent=quotes[Math.floor(Math.random()*quotes.length)]}
        setInterval(setRandomQuote,60000); setRandomQuote();
        
        updateTabStates(); 

        window.addEventListener('click', function(e) {
            if (overlayOpen && !e.target.closest('.overlay') && !e.target.closest('#tab-video') && !e.target.closest('#tab-audio')) {
                overlayOpen = null;
                document.querySelectorAll('.overlay').forEach(o => o.classList.remove('show'));
                updateTabStates();
            }
        });
    </script>
</body>
</html>
