<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Hub v4.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-family: "Space Grotesk", sans-serif; background-color: #000; overflow: hidden; user-select: none; -webkit-user-select: none; }
        .bg-photo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url("images/background.jpg") center center / cover no-repeat; z-index: 1; }
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .bg-video { position: absolute; top: 50%; left: 50%; width: 100.5%; height: 100.5%; object-fit: cover; transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.8s ease; }
        .bg-video.active { opacity: 1; }
        .widget { position: relative; z-index: 10; width: 380px; background: rgba(0, 0, 0, 0.4); -webkit-backdrop-filter: blur(5px); backdrop-filter: blur(5px); border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.1); color: white; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); padding: 25px 25px 15px; box-sizing: border-box; }
        .tabs { display: flex; justify-content: center; gap: 35px; margin-bottom: 15px; }
        .tab-icon { cursor: pointer; width: 22px; height: 22px; fill: white; opacity: 0.25; transition: all 0.3s; }
        .tab-icon.active { opacity: 1; filter: drop-shadow(0 0 8px white); }
        .view { display: none; }
        .view.active { display: flex; flex-direction: column; align-items: center; }
        .day { font-size: 16px; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 2px; opacity: 0.8; }
        .time-text { font-size: 60px; font-weight: 700; letter-spacing: 2px; margin-bottom: 15px; }
        .selector-label { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.4; margin: 12px 0 10px; }
        .selector-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .selector-item { padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); font-size: 10px; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; }
        .selector-item.active { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.5); color: white; box-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
        .time-display { display: flex; justify-content: center; align-items: center; gap: 2px; margin-bottom: 10px; }
        .time-input { background: transparent; border: none; color: white; font-family: inherit; font-size: 60px; font-weight: 700; width: 115px; text-align: center; outline: none; }
        .progress-container { width: 100%; height: 3px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: #fff; width: 100%; transition: width 1s linear; }
        .presets { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; width: 100%; }
        .preset-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.05); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; cursor: pointer; }
        .controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 5px; }
        button { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 8px 18px; border-radius: 12px; font-family: inherit; text-transform: uppercase; letter-spacing: 2px; font-size: 10px; cursor: pointer; }
        .btn-start { background: white; color: black; font-weight: 700; border: none; }
        .quote-container { font-size: 13px; font-style: italic; margin-top: 15px; line-height: 1.4; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.15); min-height: 35px; display: flex; align-items: center; justify-content: center; color: #fff; opacity: 1; }
        @keyframes finishPulse { 0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.1); } 50% { box-shadow: 0 0 60px rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.4); } }
        .widget.pulse-active { animation: finishPulse 2s infinite; }
    </style>
</head>
<body>
    <div class="bg-photo"></div>
    <div class="video-container">
        <video id="vid-cafe" class="bg-video" src="videos/rainy_cafe.mp4" loop muted playsinline></video>
        <video id="vid-shop" class="bg-video" src="videos/rainy_shop.mp4" loop muted playsinline></video>
        <video id="vid-yard" class="bg-video" src="videos/sunny_yard.mp4" loop muted playsinline></video>
    </div>
    <audio id="aud-cafe" src="audios/rainy_cafe.mp3" loop></audio>
    <audio id="aud-shop" src="audios/rainy_shop.mp3" loop></audio>
    <audio id="aud-yard" src="audios/sunny_yard.mp3" loop></audio>
    <audio id="finishSound" src="audios/notification.mp3"></audio>
    <div class="widget" id="mainWidget">
        <div class="tabs">
            <svg class="tab-icon active" id="tab-clock" onclick="switchTab('clock')" viewBox="0 0 24 24"><path d="M12 2c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2zm0 2a8 8 0 1 0 0 16 8 8 0 0 0 0-16zm1 8h4v2h-6V7h2v5z"/></svg>
            <svg class="tab-icon" id="tab-timer" onclick="switchTab('timer')" viewBox="0 0 24 24"><path d="M6 2h12v2H6V2zm11.5 7.6l1.4-1.4L20.3 9.6l-1.4 1.4c.7 1.1 1.1 2.4 1.1 3.8 0 3.9-3.1 7-7 7s-7-3.1-7-7c0-1.4.4-2.7 1.1-3.8L5.7 9.6l1.4-1.4 1.4 1.4c1.1-.7 2.4-1.1 3.8-1.1 1.4 0 2.7.4 3.8 1.1l-.4.4zm-5.5 1.4v4h4v-4h-4z"/></svg>
            <svg class="tab-icon" id="tab-media" onclick="switchTab('media')" viewBox="0 0 24 24"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z"/></svg>
        </div>
        <div id="view-clock" class="view active">
            <div class="day" id="day"></div>
            <div class="time-text" id="time-text">00:00:00</div>
        </div>
        <div id="view-timer" class="view">
            <div class="time-display"><input type="number" id="min" class="time-input" value="60">:<input type="number" id="sec" class="time-input" value="00"></div>
            <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
            <div class="presets"><div class="preset-btn" onclick="setPreset(1)">1</div><div class="preset-btn" onclick="setPreset(3)">3</div><div class="preset-btn" onclick="setPreset(5)">5</div><div class="preset-btn" onclick="setPreset(15)">15</div><div class="preset-btn" onclick="setPreset(30)">30</div><div class="preset-btn" onclick="setPreset(60)">60</div></div>
            <div class="controls"><button class="btn-start" id="startBtn" onclick="toggleTimer()">Start</button><button onclick="resetTimer()">Reset</button></div>
        </div>
        <div id="view-media" class="view">
            <div class="selector-label">Visual Atmosphere</div>
            <div class="selector-group">
                <div class="selector-item" id="v-cafe" onclick="toggleVideo('cafe')">Cafe</div>
                <div class="selector-item" id="v-shop" onclick="toggleVideo('shop')">Shop</div>
                <div class="selector-item" id="v-yard" onclick="toggleVideo('yard')">Yard</div>
            </div>
            <div class="selector-label">Background Audio</div>
            <div class="selector-group">
                <div class="selector-item" id="a-cafe" onclick="toggleAudio('cafe')">Rain</div>
                <div class="selector-item" id="a-shop" onclick="toggleAudio('shop')">Fire</div>
                <div class="selector-item" id="a-yard" onclick="toggleAudio('yard')">Jazz</div>
            </div>
        </div>
        <div class="quote-container" id="quote"></div>
    </div>
    <script>
        const quotes = ["The future belongs to those who believe in the beauty of their dreams.", "Strive not to be a success, but rather to be of value.", "Every moment is a fresh beginning.", "Believe you can and you're halfway there.", "The only way to do great work is to love what you do.", "The best way to predict the future is to create it.", "The best preparation for tomorrow is doing your best today.", "The only limit to our realization of tomorrow will be our doubts of today.", "Action is the foundational key to all success.", "Discipline is the bridge between goals and accomplishment."];
        function switchTab(t){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.tab-icon').forEach(i=>i.classList.remove('active'));document.getElementById('view-'+t).classList.add('active');document.getElementById('tab-'+t).classList.add('active')}
        function updateTime(){const n=new Date();const h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');document.getElementById('day').textContent=n.toLocaleDateString('en-US',{weekday:'long'});document.getElementById('time-text').textContent=`${h}:${m}:${s}`}
        setInterval(updateTime,1000);updateTime();
        function setRandomQuote(){document.getElementById("quote").textContent=quotes[Math.floor(Math.random()*quotes.length)]}
        setInterval(setRandomQuote,60000);setRandomQuote();
        let activeVid=null, activeAud=null;
        function toggleVideo(k){const v=document.getElementById('vid-'+k);const item=document.getElementById('v-'+k);if(activeVid&&activeVid!==k){document.getElementById('vid-'+activeVid).pause();document.getElementById('vid-'+activeVid).classList.remove('active');document.getElementById('v-'+activeVid).classList.remove('active')}if(activeVid===k){v.pause();v.classList.remove('active');item.classList.remove('active');activeVid=null}else{v.play();v.classList.add('active');item.classList.add('active');activeVid=k}}
        function toggleAudio(k){const a=document.getElementById('aud-'+k);const item=document.getElementById('a-'+k);if(activeAud&&activeAud!==k){document.getElementById('aud-'+activeAud).pause();document.getElementById('a-'+activeAud).classList.remove('active')}if(activeAud===k){a.pause();item.classList.remove('active');activeAud=null}else{a.play();item.classList.add('active');activeAud=k}}
        let timer=null,totalS=0,remainS=0,running=false;
        const minI=document.getElementById('min'),secI=document.getElementById('sec'),startB=document.getElementById('startBtn'),bar=document.getElementById('bar'),sound=document.getElementById('finishSound'),mainW=document.getElementById('mainWidget');
        function setPreset(m){resetTimer();minI.value=String(m).padStart(2,'0');secI.value="00"}
        function toggleTimer(){mainW.classList.remove('pulse-active');if(running){clearInterval(timer);startB.textContent='Start';running=false}else{if(remainS<=0){remainS=(parseInt(minI.value)||0)*60+(parseInt(secI.value)||0);totalS=remainS}if(remainS>0){running=true;startB.textContent='Pause';timer=setInterval(()=>{remainS--;minI.value=String(Math.floor(remainS/60)).padStart(2,'0');secI.value=String(remainS%60).padStart(2,'0');bar.style.width=(remainS/totalS*100)+'%';if(remainS<=0){clearInterval(timer);sound.play();mainW.classList.add('pulse-active');resetTimer(true)}},1000)}}}
        function resetTimer(auto=false){clearInterval(timer);running=false;remainS=0;totalS=0;startB.textContent='Start';bar.style.width='100%';minI.value="60";secI.value="00";if(!auto)mainW.classList.remove('pulse-active')}
    </script>
</body>
</html>
